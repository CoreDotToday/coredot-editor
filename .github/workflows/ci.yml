name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  windows-managed-process:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.6.5

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Windows capture lifecycle and local font loading
        run: pnpm exec vitest run scripts/docs/managed-process.test.ts scripts/docs/capture-assets.test.ts

  node-sqlite-concurrency:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.6.5

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Node SQLite availability
        run: node -e "if (!require('node:module').isBuiltin('node:sqlite')) process.exit(1)"

      - name: Verify SQLite lock contention
        run: pnpm exec vitest run src/features/proposals/proposal-concurrency.test.ts

  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.6.5

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install documentation dependencies
        run: python -m pip install -r requirements-docs.txt

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit and component tests
        run: pnpm test

      - name: Collaboration WebSocket tests
        run: pnpm collaboration:websocket-tests

      - name: Collaboration Docker verification
        run: pnpm docker:collaboration:verify

      - name: E2E tests
        run: pnpm e2e

      - name: Build
        env:
          AUTH_MODE: clerk
          CLERK_SECRET_KEY: sk_test_ci_build
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
        run: pnpm build

      - name: Production artifact smoke tests
        run: pnpm e2e:production

      - name: Collaboration production smoke tests
        run: pnpm collaboration:production-smoke

      - name: Documentation build
        run: pnpm docs:build

      - name: Security audit
        run: pnpm security:audit
