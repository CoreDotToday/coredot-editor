version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      next-react:
        patterns:
          - "next"
          - "react"
          - "react-dom"
      tiptap:
        patterns:
          - "@tiptap/*"
      testing:
        patterns:
          - "@playwright/*"
          - "@testing-library/*"
          - "vitest"
          - "playwright"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
