site_name: Coredot Editor
site_description: Open-source AI document editor starter built with Next.js, Tiptap, Drizzle, SQLite, and the Vercel AI SDK.
site_url: https://coredottoday.github.io/coredoteditor/
repo_name: CoreDotToday/coredoteditor
repo_url: https://github.com/CoreDotToday/coredoteditor
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - content.action.edit
    - content.code.copy
  palette:
    - scheme: default
      primary: black
      accent: indigo
  font:
    text: Inter
    code: JetBrains Mono

extra_css:
  - assets/stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Explore:
      - Product Showcase: product-tour.md
  - Build:
      - Getting Started: getting-started.md
      - Development: development.md
      - Configuration: configuration.md
      - API Reference: api-reference.md
  - Extend:
      - Adopting The Starter: ADOPTION.md
      - Project Profiles: project-profiles.md
      - Plugins: PLUGINS.md
      - Prompting: PROMPTING.md
  - Operate:
      - Architecture: ARCHITECTURE.md
      - Architecture Hardening: architecture-hardening.md
      - Real-Time Collaboration Design: realtime-collaboration.md
      - Clerk ADR: adr/0001-clerk-for-identity-and-workspace-context.md
      - Collaboration ADR: adr/0002-use-yjs-and-hocuspocus-for-real-time-collaboration.md
      - Production Readiness: production-readiness.md
      - Deployment: DEPLOYMENT.md
      - RAG Docker Stack: RAG_DOCKER.md
  - Project:
      - Roadmap: ROADMAP.md
      - Community: community.md
      - Maintainers: MAINTAINERS.md
      - Documentation Guide: DOCUMENTATION.md
