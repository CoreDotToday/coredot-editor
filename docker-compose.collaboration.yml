# Self-hosted collaboration sidecar. The database lives on an isolated named
# volume, migrations run inside the container before the server starts, and
# readiness is gated by the sidecar's own /ready endpoint.
#
# Required environment:
#   COLLABORATION_CAPABILITY_VERIFICATION_KEY_RING - public verification JWKs.
#     Never mount the private signing key ring into this service; the sidecar
#     fails closed if signing material is present.
services:
  collaboration:
    build:
      context: .
      dockerfile: Dockerfile.collaboration
    environment:
      COLLABORATION_ALLOWED_HOSTS: ${COLLABORATION_ALLOWED_HOSTS:-127.0.0.1}
      COLLABORATION_ALLOWED_ORIGINS: ${COLLABORATION_ALLOWED_ORIGINS:-http://127.0.0.1:3000}
      COLLABORATION_CAPABILITY_VERIFICATION_KEY_RING: ${COLLABORATION_CAPABILITY_VERIFICATION_KEY_RING:?set the public verification key ring}
      COLLABORATION_SERVER_ADDRESS: 0.0.0.0
      COLLABORATION_SERVER_PORT: "1234"
      COLLABORATION_SHUTDOWN_GRACE_MS: ${COLLABORATION_SHUTDOWN_GRACE_MS:-10000}
      DATABASE_URL: file:/data/collaboration.db
      NODE_ENV: production
    ports:
      # An ephemeral host port keeps parallel verification runs isolated.
      - "127.0.0.1::1234"
    stop_grace_period: 30s
    volumes:
      - collaboration-data:/data

volumes:
  collaboration-data:
