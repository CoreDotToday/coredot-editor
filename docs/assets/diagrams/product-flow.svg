<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 940" role="img" aria-labelledby="product-flow-title product-flow-desc" focusable="false">
  <title id="product-flow-title">Coredot Editor proposal and document change flow</title>
  <desc id="product-flow-desc">A draft snapshot and AI command create an AI Run that can produce zero or more proposals. Pending or rejected proposals do not change the document. Accepting one or a batch checks the expected revision before one atomic document change. A conflict leaves proposals pending. Undo also checks the expected revision and either restores the previous snapshot or makes no change.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4f46e5"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .canvas { fill: #ffffff; }
      .zone { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
      .zone-label { fill: #475569; font: 600 17px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: .08em; }
      .title { fill: #0f172a; font: 700 32px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .subtitle { fill: #475569; font: 400 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .node { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; }
      .node-accent { fill: #eef2ff; stroke: #6366f1; stroke-width: 2.5; }
      .node-safe { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; }
      .node-conflict { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; }
      .decision { fill: #ffffff; stroke: #6366f1; stroke-width: 2.5; }
      .node-title { fill: #0f172a; font: 650 20px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .node-copy { fill: #475569; font: 400 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .edge { fill: none; stroke: #4f46e5; stroke-width: 2.5; marker-end: url(#arrow); }
      .edge-muted { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrow-muted); }
      .edge-dashed { stroke-dasharray: 8 7; }
      .edge-label { fill: #4338ca; font: 600 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .edge-label-muted { fill: #475569; font: 600 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .code { fill: #312e81; font: 600 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
  </defs>

  <rect class="canvas" width="1440" height="940"/>
  <text class="title" x="48" y="52">Proposal-safe document changes</text>
  <text class="subtitle" x="48" y="82">AI suggestions stay separate from the document until a revision-checked transaction commits them.</text>

  <rect class="zone" x="48" y="112" width="1344" height="184" rx="18"/>
  <text class="zone-label" x="72" y="142">GENERATE</text>

  <rect class="node" x="80" y="166" width="270" height="94" rx="14"/>
  <text class="node-title" x="215" y="199" text-anchor="middle">Draft snapshot</text>
  <text class="node-copy" x="215" y="226" text-anchor="middle">+ AI command</text>
  <text class="node-copy" x="215" y="248" text-anchor="middle">explicit source state</text>

  <rect class="node-accent" x="444" y="166" width="220" height="94" rx="14"/>
  <text class="node-title" x="554" y="205" text-anchor="middle">AI Run</text>
  <text class="node-copy" x="554" y="232" text-anchor="middle">bounded execution</text>

  <rect class="node-accent" x="758" y="166" width="264" height="94" rx="14"/>
  <text class="node-title" x="890" y="202" text-anchor="middle">0..n Proposals</text>
  <text class="node-copy" x="890" y="229" text-anchor="middle">each starts pending</text>

  <rect class="node-safe" x="1116" y="166" width="240" height="94" rx="14"/>
  <text class="node-title" x="1236" y="202" text-anchor="middle">Zero proposals</text>
  <text class="node-copy" x="1236" y="229" text-anchor="middle">document unchanged</text>

  <path class="edge" d="M 350 213 H 444"/>
  <path class="edge" d="M 664 213 H 758"/>
  <text class="edge-label" x="711" y="198" text-anchor="middle">produces</text>
  <path class="edge-muted edge-dashed" d="M 1022 213 H 1116"/>
  <text class="edge-label-muted" x="1069" y="198" text-anchor="middle">0</text>

  <rect class="zone" x="48" y="326" width="1344" height="306" rx="18"/>
  <text class="zone-label" x="72" y="356">REVIEW AND APPLY</text>

  <rect class="node" x="80" y="392" width="224" height="82" rx="14"/>
  <text class="node-title" x="192" y="425" text-anchor="middle">Stay pending</text>
  <text class="node-copy" x="192" y="451" text-anchor="middle">review later</text>

  <rect class="node" x="80" y="514" width="224" height="82" rx="14"/>
  <text class="node-title" x="192" y="547" text-anchor="middle">Reject</text>
  <text class="node-copy" x="192" y="573" text-anchor="middle">status only</text>

  <rect class="node-safe" x="370" y="452" width="238" height="96" rx="14"/>
  <text class="node-title" x="489" y="486" text-anchor="middle">Document unchanged</text>
  <text class="node-copy" x="489" y="513" text-anchor="middle">content and revision stay put</text>

  <rect class="node-accent" x="370" y="366" width="286" height="62" rx="14"/>
  <text class="node-title" x="513" y="391" text-anchor="middle">Accept one or a batch</text>
  <text class="code" x="513" y="414" text-anchor="middle">+ expectedRevision</text>

  <polygon class="decision" points="810,352 946,416 810,480 674,416"/>
  <text class="node-title" x="810" y="409" text-anchor="middle">Revision</text>
  <text class="node-copy" x="810" y="433" text-anchor="middle">still matches?</text>

  <rect class="node-conflict" x="1044" y="362" width="288" height="94" rx="14"/>
  <text class="node-title" x="1188" y="397" text-anchor="middle">Revision conflict</text>
  <text class="node-copy" x="1188" y="424" text-anchor="middle">Proposals remain pending</text>
  <text class="node-copy" x="1188" y="446" text-anchor="middle">document unchanged</text>

  <rect class="node-accent" x="1044" y="504" width="288" height="94" rx="14"/>
  <text class="node-title" x="1188" y="538" text-anchor="middle">One atomic transaction</text>
  <text class="node-copy" x="1188" y="565" text-anchor="middle">Document Change + new revision</text>
  <text class="node-copy" x="1188" y="587" text-anchor="middle">accepted Proposal status(es)</text>

  <path class="edge-muted" d="M 304 433 H 332 V 480 H 370"/>
  <path class="edge-muted" d="M 304 555 H 332 V 520 H 370"/>
  <path class="edge" d="M 656 397 H 690"/>
  <path class="edge" d="M 946 416 H 1044"/>
  <text class="edge-label" x="995" y="401" text-anchor="middle">conflict</text>
  <path class="edge" d="M 810 480 V 551 H 1044"/>
  <text class="edge-label" x="871" y="536" text-anchor="middle">matches</text>

  <path class="edge-muted edge-dashed" d="M 890 260 V 316 H 192 V 392"/>
  <text class="edge-label-muted" x="624" y="310" text-anchor="middle">pending Proposal choices</text>
  <path class="edge-muted edge-dashed" d="M 890 260 V 316 H 54 V 555 H 80"/>
  <path class="edge-muted edge-dashed" d="M 890 260 V 316 H 513 V 366"/>

  <rect class="zone" x="48" y="662" width="1344" height="230" rx="18"/>
  <text class="zone-label" x="72" y="692">RECOVER</text>

  <rect class="node" x="80" y="730" width="236" height="96" rx="14"/>
  <text class="node-title" x="198" y="765" text-anchor="middle">Document Change</text>
  <text class="node-copy" x="198" y="792" text-anchor="middle">bounded before-snapshot</text>
  <text class="node-copy" x="198" y="814" text-anchor="middle">linked Proposals</text>

  <rect class="node-accent" x="390" y="730" width="252" height="96" rx="14"/>
  <text class="node-title" x="516" y="765" text-anchor="middle">Undo</text>
  <text class="code" x="516" y="792" text-anchor="middle">+ expectedRevision</text>
  <text class="node-copy" x="516" y="814" text-anchor="middle">server operation</text>

  <polygon class="decision" points="796,710 926,778 796,846 666,778"/>
  <text class="node-title" x="796" y="770" text-anchor="middle">Precondition</text>
  <text class="node-copy" x="796" y="795" text-anchor="middle">still holds?</text>

  <rect class="node-safe" x="1002" y="700" width="326" height="94" rx="14"/>
  <text class="node-title" x="1165" y="735" text-anchor="middle">Restore previous snapshot</text>
  <text class="node-copy" x="1165" y="762" text-anchor="middle">reset linked Proposals + new revision</text>

  <rect class="node-conflict" x="1002" y="812" width="326" height="58" rx="14"/>
  <text class="node-title" x="1165" y="837" text-anchor="middle">Conflict: no mutation</text>
  <text class="node-copy" x="1165" y="860" text-anchor="middle">reload before another action</text>

  <path class="edge-muted edge-dashed" d="M 1188 598 V 642 H 198 V 730"/>
  <path class="edge" d="M 316 778 H 390"/>
  <path class="edge" d="M 642 778 H 666"/>
  <path class="edge" d="M 926 758 H 968 V 747 H 1002"/>
  <text class="edge-label" x="964" y="735" text-anchor="middle">holds</text>
  <path class="edge" d="M 926 798 H 968 V 841 H 1002"/>
  <text class="edge-label" x="964" y="824" text-anchor="middle">conflict</text>
</svg>
